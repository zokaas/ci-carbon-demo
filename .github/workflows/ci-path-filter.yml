name: ci-path-filter

on:
  push:
    branches:
      - ci-sim
    paths:
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'jest.config.js'
      - 'nest-cli.json'
      - '.eslintrc.js'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Start Eco CI measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
          send-data: true
          json-output: true
          co2-calculation-method: location-based
          co2-grid-intensity-api-token: ${{ secrets.ELECTRICITYMAPS_API_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Measure install
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'install'
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Measure lint-typecheck
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'lint-typecheck'
        continue-on-error: true

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e

      - name: Measure test-suite
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'test-suite'
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Measure build
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'build'
        continue-on-error: true

      - name: Final measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          send-data: true
          json-output: true
        continue-on-error: true
        if: always()

      - name: Save energy artifact
        if: always()
        run: |
          mkdir -p results
          cp /tmp/eco-ci/lap-data.json \
            results/energy-${{ github.workflow }}-${{ github.run_id }}.json || true

      - name: Upload energy artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: energy-${{ github.workflow }}-${{ github.run_id }}
          path: results/energy-*.json
          retention-days: 30
