name: ci-cached

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Start Eco CI measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
          json-output: true
          electricitymaps-api-token: ${{ secrets.ELECTRICITYMAPS_API_TOKEN }}
        continue-on-error: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Measure install
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'install'
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Measure lint-typecheck
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'lint-typecheck'
        continue-on-error: true

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e

      - name: Measure test-suite
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'test-suite'
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Final measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: final-measurement
          send-data: true
          json-output: true
        continue-on-error: true
        if: always()

      - name: Save energy artifact
        if: always()
        run: |
          mkdir -p results
          cp /tmp/eco-ci/lap-data.json \
            results/energy-${{ github.workflow }}-${{ github.run_id }}.json || true

      - name: Upload energy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: energy-${{ github.workflow }}-${{ github.run_id }}
          path: results/energy-*.json
          retention-days: 30
